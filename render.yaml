services:
  - type: web
    name: loan-agents
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python ops/seed_data.py && gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TRANCHI_API_SECRET
        sync: false
      - key: LENDER_WEBHOOK_SECRET
        sync: false
      - key: OUTBOUND_AGENT_URL
        value: https://tranchi-outbound-agent.onrender.com
      - key: DB_PATH
        value: /opt/render/project/data/loan_agents.db
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_S3_KEY_PREFIX
        value: intake/
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: ZAPIER_HOOK_PREQUAL_LETTER_SENT
        sync: false
      - key: LO_FIRM_NAME
        value: "Munoz, Ghezlan & Co., Ltd."
      - key: LO_FIRM_ADDR_1
        value: "99 Wall Street, Suite 4041"
      - key: LO_FIRM_ADDR_2
        value: "New York, NY 10005"
      - key: LO_SIGNER_NAME
        value: "Marc Munoz"
      - key: LO_SIGNER_TITLE
        value: "Senior Loan Officer"
      - key: LO_SIGNER_EMAIL
        value: "marc@munoz.ltd"
      - key: LO_SIGNER_PHONE
        value: "(917) 981-0032"
      - key: ZAPIER_MCP_ENDPOINT
        sync: false
      - key: ZAPIER_MCP_API_KEY
        sync: false
      - key: PUBLIC_BASE_URL
        value: https://loan-agents.onrender.com
      - key: DEAL_FLOW_URL
        value: https://tranchi-deal-flow-agents.onrender.com
      - key: LOAN_APPLICATION_URL
        value: https://2589631.my1003app.com/0/register
      - key: ZAPIER_INBOUND_SECRET
        sync: false
      - key: TYPEFORM_ACCESS_TOKEN
        sync: false   # Personal Access Token; required to download borrower-uploaded
                      # asset statements from api.typeform.com so the autofire pipeline
                      # can OCR them. Without it, downloads 401 and the letter is skipped.
      # ── Transaction Coordinator (merged from ai_transaction_coordinator) ──
      # shadow = log only, never dispatch outbound. Flip to "live" once the
      # rules + deadline math are trusted against real transactions.
      - key: TX_AGENT_MODE
        value: shadow
      - key: TX_SWEEPER_COOLDOWN_HOURS
        value: "24"
      - key: TX_SWEEPER_CONTACT_REFRESH_HOURS
        value: "6"
    disk:
      name: loan-agents-data
      mountPath: /opt/render/project/data
      sizeGB: 1
    healthCheckPath: /health
    # Deploy is gated behind CI (.github/workflows/ci.yml) — the test job must
    # pass before the deploy job fires the Render deploy hook. Blind push-to-
    # deploy is off so a red commit can't reach the live lender.
    autoDeploy: false

  # Render Cron: fire the proactive TC sweeper every 15 minutes. Owns no state
  # of its own — just calls /api/tx/sweep on the loan-agents web service. Mode
  # obeys TX_AGENT_MODE on the web service.
  - type: cron
    name: loan-agents-tx-sweeper
    runtime: python
    schedule: "*/15 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: |
      python -c "import os, requests; \
        r = requests.post( \
          os.environ['PUBLIC_BASE_URL'].rstrip('/') + '/api/tx/sweep', \
          headers={'Authorization': 'Bearer ' + os.environ['TRANCHI_API_SECRET']}, \
          timeout=120); \
        print(r.status_code, r.text[:500])"
    envVars:
      - key: PUBLIC_BASE_URL
        value: https://loan-agents.onrender.com
      - key: TRANCHI_API_SECRET
        sync: false
