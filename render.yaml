services:
  - type: web
    name: loan-agents
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python ops/seed_data.py && gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TRANCHI_API_SECRET
        sync: false
      - key: LENDER_WEBHOOK_SECRET
        sync: false
      - key: OUTBOUND_AGENT_URL
        value: https://tranchi-outbound-agent.onrender.com
      - key: DB_PATH
        value: /opt/render/project/data/loan_agents.db
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_S3_KEY_PREFIX
        value: intake/
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: ZAPIER_HOOK_PREQUAL_LETTER_SENT
        sync: false
      - key: LO_FIRM_NAME
        value: "Munoz, Ghezlan & Co., Ltd."
      - key: LO_FIRM_ADDR_1
        value: "99 Wall Street, Suite 4041"
      - key: LO_FIRM_ADDR_2
        value: "New York, NY 10005"
      - key: LO_SIGNER_NAME
        value: "Marc Munoz"
      - key: LO_SIGNER_TITLE
        value: "Senior Loan Officer"
      - key: LO_SIGNER_EMAIL
        value: "marc@munoz.ltd"
      - key: LO_SIGNER_PHONE
        value: "(917) 981-0032"
      - key: ZAPIER_MCP_ENDPOINT
        sync: false
      - key: ZAPIER_MCP_API_KEY
        sync: false
    disk:
      name: loan-agents-data
      mountPath: /opt/render/project/data
      sizeGB: 1
    healthCheckPath: /health
    autoDeploy: true
